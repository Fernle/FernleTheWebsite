<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernle - Unity Developer & Gamer</title>
    <meta name="description" content="Ahmet Fernle Emir - Unity Developer, gamer, and MMORPG & ARPG enthusiast">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="index.html" class="site-title">Fernle</a>
    </header>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-buttons">
            <a href="#" class="nav-btn gamer-btn" data-page="gamer">
                <span class="btn-icon">🎮</span>
                <span class="btn-text">the Gamer</span>
            </a>
            <a href="#" class="nav-btn developer-btn" data-page="developer">
                <span class="btn-icon">💻</span>
                <span class="btn-text">the Developer</span>
            </a>
            <button id="settings-btn" class="nav-btn settings-btn" style="display: none;" onclick="window.colorManager && window.colorManager.toggleSettings()">
                <span class="btn-icon">⚙️</span>
                <span class="btn-text">Settings</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Logo Section -->
            <div class="logo-section">
                <img src="Images/pp.jpeg" alt="Fernle Logo" class="logo">
            </div>

            <!-- Introduction Section -->
            <div class="intro-section">
                <h2 class="intro-name">Hi, I am Ahmet "Fernle" Emir.</h2>
                <p class="intro-text">
                    Unity Developer, gamer, and MMORPG & ARPG enthusiast. 
                    I graduated in 2025 from Istanbul Bilgi University with a degree in Digital Game Design.
                </p>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="settings-modal">
        <div class="settings-modal-content">
            <div class="settings-modal-header">
                <h2>⚙️ Color Settings</h2>
                <button class="settings-close" onclick="window.colorManager && window.colorManager.toggleSettings()">&times;</button>
            </div>
            <div class="settings-modal-body">
                <div class="settings-section">
                    <h3>Gradient Background</h3>
                    <div class="color-input-group">
                        <label for="gradient-color-1">Color 1</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="gradient-color-1" class="color-picker" value="#FF6B35">
                            <input type="text" id="gradient-color-1-text" class="color-text" value="#FF6B35" readonly>
                        </div>
                    </div>
                    <div class="color-input-group">
                        <label for="gradient-color-2">Color 2</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="gradient-color-2" class="color-picker" value="#E63E3E">
                            <input type="text" id="gradient-color-2-text" class="color-text" value="#E63E3E" readonly>
                        </div>
                    </div>
                    <div class="color-input-group">
                        <label for="gradient-color-3">Color 3</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="gradient-color-3" class="color-picker" value="#C93333">
                            <input type="text" id="gradient-color-3-text" class="color-text" value="#C93333" readonly>
                        </div>
                    </div>
                    <div class="color-input-group">
                        <label for="gradient-color-4">Color 4</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="gradient-color-4" class="color-picker" value="#D4581A">
                            <input type="text" id="gradient-color-4-text" class="color-text" value="#D4581A" readonly>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>Header Colors</h3>
                    <div class="color-input-group">
                        <label for="header-bg">Background (Opacity)</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="header-bg" class="color-picker" value="#E63E3E">
                            <input type="range" id="header-bg-opacity" class="opacity-slider" min="0" max="100" value="10">
                            <input type="text" id="header-bg-opacity-text" class="color-text small" value="10%" readonly>
                        </div>
                    </div>
                    <div class="color-input-group">
                        <label for="header-border">Border (Opacity)</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="header-border" class="color-picker" value="#E63E3E">
                            <input type="range" id="header-border-opacity" class="opacity-slider" min="0" max="100" value="20">
                            <input type="text" id="header-border-opacity-text" class="color-text small" value="20%" readonly>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>Text Colors</h3>
                    <div class="color-input-group">
                        <label for="text-color">Text Color</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="text-color" class="color-picker" value="#5D4037">
                            <input type="text" id="text-color-text" class="color-text" value="#5D4037" readonly>
                        </div>
                    </div>
                </div>

                <div class="settings-actions">
                    <button onclick="window.colorManager && window.colorManager.resetToDefault()" class="settings-btn-secondary">Reset to Default</button>
                    <button onclick="window.colorManager && window.colorManager.saveSettings()" class="settings-btn-primary">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
    <script src="admin-colors.js"></script>
</body>
</html>
